name: ga4_ecommerce_analytics
version: '1.0.0'
config-version: 2

profile: default

model-paths: ["models"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]
seed-paths: ["seeds"]
test-paths: ["tests"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  ga4_source_project: bigquery-public-data
  ga4_source_dataset: ga4_obfuscated_sample_ecommerce
  ga4_start_date: '20201101'
  ga4_end_date: '20210131'

models:
  ga4_ecommerce_analytics:
    +persist_docs:
      relation: true
      columns: true

    staging:
      +materialized: view
      +schema: stg

    intermediate:
      +materialized: table
      +schema: int

    marts:
      +materialized: table
      +schema: mart